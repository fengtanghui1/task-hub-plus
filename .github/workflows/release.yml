name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    name: Build release assets
    runs-on: macos-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Run smoke test
        run: npm run smoke

      - name: Prepare release assets
        run: npm run release:assets

      - name: Check version metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VERSIONS_MIN_APP="$(node -p "require('./versions.json')['${VERSION}'] || ''")"

          if [ "${VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Tag ${VERSION} does not match manifest.json version ${MANIFEST_VERSION}."
            exit 1
          fi

          if [ "${VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${VERSION} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

          if [ -z "${VERSIONS_MIN_APP}" ]; then
            echo "versions.json does not contain an entry for ${VERSION}."
            exit 1
          fi

      - name: Verify release assets
        run: |
          test -s dist/main.js
          test -s dist/manifest.json
          test -s dist/styles.css

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Task Hub ${GITHUB_REF_NAME#v}" \
              --notes "Task Hub release ${GITHUB_REF_NAME#v}."
            gh release upload "${GITHUB_REF_NAME}" \
              dist/main.js \
              dist/manifest.json \
              dist/styles.css \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/main.js \
              dist/manifest.json \
              dist/styles.css \
              --title "Task Hub ${GITHUB_REF_NAME#v}" \
              --notes "Task Hub release ${GITHUB_REF_NAME#v}."
          fi
