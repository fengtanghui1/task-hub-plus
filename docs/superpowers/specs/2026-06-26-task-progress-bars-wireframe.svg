<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Task Hub low fidelity wireframe for task progress bars</title>
  <desc id="desc">A grayscale wireframe showing a settings toggle for subtask progress bars and a task list with parent task progress bars and recursive progress examples.</desc>
  <style>
    .bg { fill: #f6f6f6; }
    .panel { fill: #ffffff; stroke: #222222; stroke-width: 2; }
    .soft { fill: #fafafa; stroke: #777777; stroke-width: 1.5; }
    .line { stroke: #222222; stroke-width: 2; }
    .muted-line { stroke: #999999; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .text { font-family: "Helvetica Neue", Arial, sans-serif; fill: #111111; font-size: 22px; }
    .small { font-family: "Helvetica Neue", Arial, sans-serif; fill: #333333; font-size: 18px; }
    .tiny { font-family: "Helvetica Neue", Arial, sans-serif; fill: #555555; font-size: 16px; }
    .title { font-family: "Helvetica Neue", Arial, sans-serif; fill: #111111; font-size: 30px; font-weight: 700; }
    .section { font-family: "Helvetica Neue", Arial, sans-serif; fill: #111111; font-size: 24px; font-weight: 700; }
    .mono { font-family: Menlo, Monaco, monospace; fill: #333333; font-size: 16px; }
  </style>

  <rect class="bg" x="0" y="0" width="1400" height="900" />
  <text class="title" x="70" y="70">Task Hub - Task Progress Bars (Low Fidelity)</text>

  <rect class="panel" x="60" y="110" width="420" height="300" rx="14" />
  <text class="section" x="90" y="155">Settings</text>
  <line class="line" x1="90" y1="175" x2="450" y2="175" />

  <rect class="soft" x="90" y="210" width="360" height="92" rx="12" />
  <text class="text" x="112" y="248">Show subtask progress bars</text>
  <text class="tiny" x="112" y="275">Show a progress bar on tasks that contain subtasks.</text>
  <text class="tiny" x="112" y="297">Progress uses the full subtask tree.</text>
  <rect class="panel" x="365" y="228" width="64" height="34" rx="17" />
  <circle cx="409" cy="245" r="13" fill="#222222" />
  <text class="small" x="365" y="286">Default: ON</text>

  <rect class="soft" x="90" y="325" width="360" height="50" rx="10" />
  <text class="small" x="112" y="357">When OFF: hide bars in list and details</text>

  <rect class="panel" x="520" y="110" width="820" height="720" rx="14" />
  <text class="section" x="550" y="155">Tasks View</text>
  <line class="line" x1="550" y1="175" x2="1310" y2="175" />

  <rect class="soft" x="550" y="205" width="470" height="585" rx="12" />
  <text class="small" x="575" y="240">Task list</text>

  <rect class="panel" x="575" y="265" width="420" height="126" rx="12" />
  <rect x="593" y="286" width="18" height="18" fill="#ffffff" stroke="#222222" stroke-width="2" />
  <text class="text" x="625" y="302">Release Task Hub 0.4.0</text>
  <text class="small" x="918" y="302">50%</text>
  <text class="tiny" x="625" y="330">Parent task with children</text>
  <rect class="soft" x="625" y="346" width="290" height="16" rx="8" />
  <rect x="625" y="346" width="145" height="16" rx="8" fill="#666666" />
  <text class="tiny" x="625" y="380">Progress remains visible even when subtree is collapsed</text>

  <text class="small" x="625" y="435">v  Refresh docs</text>
  <text class="small" x="918" y="435">100%</text>
  <rect x="645" y="449" width="230" height="12" rx="6" fill="#666666" />
  <rect x="645" y="449" width="230" height="12" rx="6" fill="none" stroke="#222222" stroke-width="1.5" />

  <text class="small" x="625" y="500">&gt;  QA pass</text>
  <text class="small" x="918" y="500">50%</text>
  <rect x="645" y="514" width="230" height="12" rx="6" fill="#ffffff" stroke="#222222" stroke-width="1.5" />
  <rect x="645" y="514" width="115" height="12" rx="6" fill="#666666" />

  <text class="tiny" x="670" y="555">- [x] Manual smoke</text>
  <text class="tiny" x="670" y="580">- [ ] Regression suite</text>

  <text class="small" x="625" y="628">-  Publish release</text>
  <text class="small" x="918" y="628">0%</text>
  <rect x="645" y="642" width="230" height="12" rx="6" fill="#ffffff" stroke="#222222" stroke-width="1.5" />

  <rect class="panel" x="575" y="690" width="420" height="72" rx="12" />
  <rect x="593" y="712" width="18" height="18" fill="#ffffff" stroke="#222222" stroke-width="2" />
  <text class="text" x="625" y="728">Reply to client email</text>
  <text class="tiny" x="625" y="751">Leaf task: no progress bar</text>

  <rect class="soft" x="1045" y="205" width="265" height="585" rx="12" />
  <text class="small" x="1070" y="240">Task details</text>

  <text class="text" x="1070" y="285">Release Task Hub 0.4.0</text>
  <text class="small" x="1070" y="325">Subtask progress</text>
  <rect class="soft" x="1070" y="340" width="200" height="18" rx="9" />
  <rect x="1070" y="340" width="100" height="18" rx="9" fill="#666666" />
  <text class="small" x="1282" y="355" text-anchor="end">50%</text>

  <text class="tiny" x="1070" y="392">1 direct child complete</text>
  <text class="tiny" x="1070" y="418">1 direct child partially complete</text>
  <text class="tiny" x="1070" y="444">1 direct child not started</text>

  <line class="muted-line" x1="1068" y1="470" x2="1286" y2="470" />

  <text class="small" x="1070" y="510">Recursive rule</text>
  <text class="mono" x="1070" y="540">parent = avg(child progress)</text>
  <text class="mono" x="1070" y="568">leaf done = 100</text>
  <text class="mono" x="1070" y="596">leaf open = 0</text>

  <text class="small" x="1070" y="650">Important behavior</text>
  <text class="tiny" x="1070" y="680">Progress does not change when completed</text>
  <text class="tiny" x="1070" y="702">children are hidden by filters.</text>
  <text class="tiny" x="1070" y="730">Parent checkbox and subtree progress are</text>
  <text class="tiny" x="1070" y="752">shown as separate signals.</text>
</svg>
